name: travel_tracker
description: Travel Tracker App with Cities, Ratings, Photos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State / Storage
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Media / Files
  image_picker: ^0.8.7+5
  path_provider: ^2.0.15

  # Formatting / Utils
  intl: ^0.18.1
  uuid: ^4.4.0
  auto_size_text: ^3.0.0

  # Maps (bewusst behalten)
  google_maps_flutter: ^2.6.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # System / UI
  url_launcher: ^6.2.6
  flutter_svg: ^2.0.10

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10

  # Config
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.3.3
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/cities.json
    - assets/logo.png
    - assets/banner.png
    - assets/maps/world.svg
    - assets/icons/add_city.png
    - assets/data/places_by_city/

